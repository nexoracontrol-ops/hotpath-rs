name: Rust CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # if: false
    name: test ${{ matrix.rust }}
    runs-on: windows-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable
          - nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}
      - name: Build default features
        run: cargo build
      - name: Build with hotpath feature
        run: cargo build --features hotpath
      - name: Build with hotpath-alloc feature
        run: cargo build --features='hotpath,hotpath-alloc'
      - name: Run lib tests
        run: |
          cargo test --lib --features hotpath
      - name: Run CLI tests
        run: |
          cargo test -p hotpath --bin hotpath --features=tui
      - name: Run functions_timing tests
        run: |
          cargo test --features hotpath --test functions_timing -- --nocapture --test-threads=1
      - name: Run functions_alloc tests
        run: |
          cargo test --features hotpath --test functions_alloc -- --nocapture --test-threads=1
      - name: Run threads tests
        run: |
          cargo test --features hotpath --test threads -- --nocapture --test-threads=1
