name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: test ${{ matrix.rust }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        rust:
          - 1.89
          - stable
          - nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}
      - uses: taiki-e/install-action@cargo-audit
        if: matrix.rust == 'stable'
      - name: Check no features
        run: |
          cargo check
      - name: Check all features
        run: |
          cargo check --all-features
      - name: Check hotpath crate with all features
        run: |
          cargo check -p hotpath --all-features 
      - name: Check hotpath feature (time mode)
        run: |
          cargo check --features hotpath
      - name: Check hotpath tui
        run: |
          cargo check --bin hotpath --features tui
      - name: Check hotpath-alloc
        run: |
          cargo check --features "hotpath,hotpath-alloc"
      - name: Check hotpath-mcp
        run: |
          cargo check --features "hotpath,hotpath-mcp"
      - name: Check hotpath-meta
        run: |
          cargo check --features "hotpath,hotpath-alloc-meta,hotpath-meta"
      - name: Fmt
        if: matrix.rust == 'stable'
        run: |
          cargo fmt --all --check
      - name: Lint (default features)
        if: matrix.rust == 'stable'
        run: |
          cargo clippy --all --features hotpath -- -D warnings
      - name: Lint (--all-features)
        if: matrix.rust == 'stable'
        run: |
          cargo clippy --all --all-features -- -D warnings
      - name: Lint (hotpath-alloc)
        if: matrix.rust == 'stable'
        run: |
          cargo clippy --all --features "hotpath,hotpath-alloc" -- -D warnings
      - name: Audit
        if: matrix.rust == 'stable'
        run: |
          cargo audit --ignore RUSTSEC-2023-0071
      - name: Run lib tests
        run: |
          cargo test --lib --features hotpath
      - name: Check TUI build
        run: |
          cargo check -p hotpath --bin hotpath --features=tui
      - name: Check meta TUI build
        run: |
          cargo check --features='tui,hotpath,hotpath-meta,hotpath-alloc-meta,hotpath-mcp,hotpath-mcp-meta,dev' --bin hotpath
      - name: Check utils build
        run: |
          cargo check -p hotpath --bin hotpath-utils --features=utils
      - name: Run CLI tests
        run: |
          cargo test -p hotpath --bin hotpath --features=tui
      - name: Run guards tests
        run: |
          cargo test --features hotpath --test guards -- --nocapture --test-threads=1
      - name: Run functions_timing tests
        run: |
          cargo test --features hotpath --test functions_timing -- --nocapture --test-threads=1
      - name: Run functions_alloc tests
        run: |
          cargo test --features hotpath --test functions_alloc -- --nocapture --test-threads=1
      - name: Run all_noop example
        run: |
          cargo run --example all_noop 
      - name: Run noop example
        run: |
          cargo run --example basic_std 
      - name: Run streams tests
        run: |
          cargo test --features hotpath --test streams -- --nocapture --test-threads=1
      - name: Run channels crossbeam tests
        run: |
          cargo test --features hotpath --test channels_crossbeam -- --nocapture --test-threads=1
      - name: Run channels futures tests
        run: |
          cargo test --features hotpath --test channels_ftc -- --nocapture --test-threads=1
      - name: Run channels async tests
        run: |
          cargo test --features hotpath --test channels_asc -- --nocapture --test-threads=1
      - name: Run channels std tests
        run: |
          cargo test --features hotpath --test channels_std -- --nocapture --test-threads=1
      - name: Run channels tokio tests
        run: |
          cargo test --features hotpath --test channels_tokio -- --nocapture --test-threads=1
      - name: Run threads tests
        run: |
          cargo test --features hotpath --test threads -- --nocapture --test-threads=1
      - name: Run futures tests
        run: |
          cargo test --features hotpath --test futures -- --nocapture --test-threads=1
      - name: Run debug tests
        run: |
          cargo test --features hotpath --test debug -- --nocapture --test-threads=1

  cpu-macos:
    name: cpu tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-cpu
      - name: Download samply binary from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.cargo/bin
          gh release download samply-macos-release -p samply -D ~/.cargo/bin --repo ${{ github.repository }}
          chmod +x ~/.cargo/bin/samply
          sudo chown root:wheel ~/.cargo/bin/samply
          sudo chmod u+s ~/.cargo/bin/samply
      - name: Build hotpath-samply wrapper
        run: |
          cargo build -p hotpath --bin hotpath-samply --features "hotpath,hotpath-cpu"
      - name: Run functions_cpu tests
        env:
          HOTPATH_SAMPLY_WRAPPER_BIN: ${{ github.workspace }}/target/debug/hotpath-samply
        run: |
          cargo test --features "hotpath,hotpath-cpu" --test functions_cpu -- --nocapture --test-threads=1
