name: Build and store samply binary (Linux)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-samply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install samply
        run: |
          cargo install samply --locked

      - name: Upload samply binary to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=samply-release

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Uploading to existing release..."
            gh release upload "$TAG" ~/.cargo/bin/samply --clobber
          else
            echo "Creating new release..."
            gh release create "$TAG" ~/.cargo/bin/samply \
              --title "Samply Binary" \
              --notes "Prebuilt samply binary, used in CI for hotpath-cpu tests"
          fi
