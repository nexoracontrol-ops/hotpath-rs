# Verifies that direct dep version floors in Cargo.toml are accurate.
# Pins all workspace direct deps to their minimum semver-compatible versions
# and runs `cargo check`. A failure means a Cargo.toml min version needs bumping.
# Test/meta/dev/tui/mcp crates are stripped since they are not used in host applications where compatibility matters.

name: Min versions

on:
  push:
    branches: [main]
  pull_request:

jobs:
  min-versions:
    name: build with min semver-compatible deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: min-versions
      - name: Run min-versions check
        run: ./scripts/check_min_versions.sh
