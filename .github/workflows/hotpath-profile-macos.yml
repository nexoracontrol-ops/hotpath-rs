name: hotpath-profile-macos

on:
  pull_request:

permissions:
  contents: read

jobs:
  profile:
    if: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Create metrics directory
        run: mkdir -p /tmp/metrics

      - name: Head noop benchmark (timing)
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/head_noop.json
        run: cargo run --release --example benchmark_noop --features='hotpath'

      - name: Head alloc benchmark (timing + alloc)
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/head_alloc.json
        run: cargo run --release --example benchmark_alloc --features='hotpath,hotpath-alloc'

      - name: Checkout base
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Base noop benchmark (timing)
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/base_noop.json
        run: cargo run --release --example benchmark_noop --features='hotpath'

      - name: Base alloc benchmark (timing + alloc)
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/base_alloc.json
        run: cargo run --release --example benchmark_alloc --features='hotpath,hotpath-alloc'

      - name: Save PR metadata
        run: |
          echo '${{ github.event.pull_request.number }}' > /tmp/metrics/pr_number.txt
          echo '${{ github.base_ref }}' > /tmp/metrics/base_ref.txt
          echo '${{ github.head_ref }}' > /tmp/metrics/head_ref.txt

      - uses: actions/upload-artifact@v4
        with:
          name: profile-metrics-macos
          path: /tmp/metrics/
          retention-days: 1
