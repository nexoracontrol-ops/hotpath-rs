name: Build and store samply binary (macOS)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-samply-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install samply
        run: |
          cargo install samply --locked

      - name: Upload samply binary to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=samply-macos-release
          BIN=~/.cargo/bin/samply

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Uploading to existing release..."
            gh release upload "$TAG" "$BIN" --clobber
          else
            echo "Creating new release..."
            gh release create "$TAG" "$BIN" \
              --title "Samply Binary (macOS)" \
              --notes "Prebuilt samply binary for macOS, used in CI for hotpath-cpu tests"
          fi
